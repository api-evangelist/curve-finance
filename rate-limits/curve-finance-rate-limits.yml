specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Curve Finance
providerId: curve-finance
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - DeFi
  - DEX
  - Rate Limiting
description: >-
  Curve's public REST API at api.curve.finance is operated on a fair-use basis without published
  per-key limits. Empirically responses are cached at the edge and consumers should respect a
  soft limit of around 60 requests per minute per IP.
notes: Curve does not publish a contractual rate limit; figures are best-effort.
sources:
  - https://docs.curve.finance/
  - https://github.com/curvefi/curve-api
responseCodes:
  throttled: 429
limits:
  - name: Public API (fair use)
    scope: ip
    metric: requests_per_minute
    limit: 60
    notes: Soft fair-use; cache aggressively because most endpoints recompute on a fixed cadence.
policies:
  - name: Caching
    description: Most endpoints recompute every few minutes; cache responses to avoid hammering the public API.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
