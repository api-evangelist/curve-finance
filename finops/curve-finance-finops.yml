specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Curve Finance
providerId: curve-finance
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - DeFi
  - DEX
  - On-chain
  - FinOps
  - FOCUS
description: >-
  FinOps view of Curve. There is no SaaS bill. Cost is on-chain gas (chain native token) and
  Curve protocol swap fee (typically 0.04%) per trade. FinOps allocation is therefore by wallet
  and by smart-contract interaction, not by API key.
sources:
  - https://docs.curve.finance/
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Curve Finance DAO
serviceCategory: DeFi Protocol
billingModel:
  pricingCategory: On-chain Usage Fee
  billingFrequency: Per Transaction
  billingCurrency: Native Chain Asset
  chargeCategories:
    - Usage
focusColumns:
  ServiceName: Curve Finance Pools
  ServiceCategory: DeFi Protocol
  ProviderName: Curve Finance DAO
  PublisherName: Curve Finance DAO
  InvoiceIssuerName: On-chain
  BillingCurrency: Native Asset
  ChargeCategory: Usage
meters:
  - name: gas
    description: Native-asset gas cost per swap or LP operation.
    unit: gas
    aggregation: sum
    dimensions:
      - wallet
      - chain
      - pool
  - name: protocol_fee
    description: Protocol-level swap fee (typically 0.04%).
    unit: percent_of_notional
    aggregation: sum
    dimensions:
      - wallet
      - pool
principles:
  - name: Visibility
    description: Pull on-chain swap events into FinOps store; tag by wallet and pool.
  - name: Allocation
    description: Allocate gas and protocol fee to consuming desk by wallet.
  - name: Optimization
    description: Batch swaps; choose the cheapest pool route; pay attention to gas-price strategy.
  - name: Accountability
    description: Assign a wallet owner per executing strategy; reconcile monthly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
