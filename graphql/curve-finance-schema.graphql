  " Timestamp of this event "
  timestamp: BigInt!

  " Input tokens of the pool "
  inputTokens: [Token!]!

  " Output token of the pool "
  outputToken: Token

  " Amount of input tokens in native units "
  inputTokenAmounts: [BigInt!]!

  " Amount of output tokens in native units "
  outputTokenAmount: BigInt

  " USD-normalized value of tokens withdrawn "
  amountUSD: BigDecimal!

  " The pool involving this transaction "
