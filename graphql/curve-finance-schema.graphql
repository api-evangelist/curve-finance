"""
An event is any user action that occurs in a protocol. Generally Ethereum events
emitted by smart contract functions, stored in transaction receipts as event logs.
"""
interface Event {
  " { Event type }-{ Transaction hash }-{ Log index } "
  id: ID!

  " Transaction hash of the transaction that emitted this event "
  hash: String!

  " Event log index "
  logIndex: Int!

  " The protocol this transaction belongs to "
  protocol: DexAmmProtocol!

  " Address that received the tokens "
  to: String!

  " Address that sent the tokens "
  from: String!

  " Block number of this event "
  blockNumber: BigInt!

  " Timestamp of this event "
  timestamp: BigInt!
}

type Deposit implements Event @entity @transaction {
  " deposit-{ Transaction hash }-{ Log index } "
  id: ID!

  " Transaction hash "
  hash: String!

  " Event log index "
  logIndex: Int!

  " The protocol this transaction belongs to "
  protocol: DexAmmProtocol!

  " Address that received the tokens "
  to: String!

  " Address that sent the tokens "
  from: String!

  " Block number of this event "
  blockNumber: BigInt!

  " Timestamp of this event "
  timestamp: BigInt!

  " Input tokens of the pool (e.g. DAI, USDC, USDT for 3pool) "
  inputTokens: [Token!]!

  " Output token of the pool (e.g. the 3CRV LP token) "
  outputToken: Token

  " Amount of input tokens in native units "
  inputTokenAmounts: [BigInt!]!

  " Amount of output tokens in native units "
  outputTokenAmount: BigInt

  " USD-normalized value of tokens deposited "
  amountUSD: BigDecimal!

  " The pool involving this transaction "
  pool: LiquidityPool!
}

type Withdraw implements Event @entity @transaction {
  " withdraw-{ Transaction hash }-{ Log index } "
  id: ID!

  " Transaction hash "
  hash: String!

  " Event log index "
  logIndex: Int!

  " The protocol this transaction belongs to "
