enum ProtocolType {
  EXCHANGE
  LENDING
  YIELD
  BRIDGE
  GENERIC
}

type Token @entity @regularPolling {
  " Smart contract address of the token "
  id: ID!

  " Name of the token, mirrored from the smart contract "
  name: String!

  " Symbol of the token, mirrored from the smart contract "
  symbol: String!

  " The number of decimal places this token uses, default to 18 "
  decimals: Int!

  " Whether this token is a curve lp token "
  isBasePoolLpToken: Boolean!

  " Optional field to track the price of a token, mostly for caching purposes "
  lastPriceUSD: BigDecimal

  " Optional field to track the block number of the last token price "
  lastPriceBlockNumber: BigInt

  " Optional field to track the method used for fetching the token price "
  oracleType: String

  " Amount of tokens in the protocol "
  _totalSupply: BigInt!

  " Total value locked in the protocol "
  _totalValueLockedUSD: BigDecimal!

  _largePriceChangeBuffer: Int!

  _largeTVLImpactBuffer: Int!
}

enum RewardTokenType {
  " For reward tokens awarded to LPs/lenders "
  DEPOSIT

  " For reward tokens awarded to borrowers "
  BORROW
}

type RewardToken @entity @regularPolling {
  " { Reward token type }-{ Smart contract address of the reward token } "
  id: ID!

  " Reference to the actual token "
  token: Token!

  " The type of the reward token "
  type: RewardTokenType!
}

enum LiquidityPoolFeeType {
  FIXED_TRADING_FEE
  TIERED_TRADING_FEE
  DYNAMIC_TRADING_FEE
  FIXED_LP_FEE
  DYNAMIC_LP_FEE
  FIXED_PROTOCOL_FEE
  DYNAMIC_PROTOCOL_FEE
  DEPOSIT_FEE
  WITHDRAWAL_FEE
}

type LiquidityPoolFee @entity @regularPolling {
  " { Fee type }-{ Pool address } "
  id: ID!

  " Fee as a percentage of the trade (swap) amount "
  feePercentage: BigDecimal

  " Type of fee this pool uses "
  feeType: LiquidityPoolFeeType!
}

interface Protocol {
  id: ID!
  name: String!
  slug: String!
  schemaVersion: String!
  subgraphVersion: String!
  methodologyVersion: String!
  network: Network!
  type: ProtocolType!
  totalValueLockedUSD: BigDecimal!
  protocolControlledValueUSD: BigDecimal
  cumulativeSupplySideRevenueUSD: BigDecimal!
  cumulativeProtocolSideRevenueUSD: BigDecimal!
  cumulativeTotalRevenueUSD: BigDecimal!
  cumulativeUniqueUsers: Int!
  totalPoolCount: Int!
  dailyUsageMetrics: [UsageMetricsDailySnapshot!]! @derivedFrom(field: "protocol")
  hourlyUsageMetrics: [UsageMetricsHourlySnapshot!]! @derivedFrom(field: "protocol")
  financialMetrics: [FinancialsDailySnapshot!]! @derivedFrom(field: "protocol")
}

type DexAmmProtocol implements Protocol @entity @regularPolling {
  " Smart contract address of the protocol's main contract (Factory, Registry, etc) "
  id: ID!

  " Name of the protocol, including version. e.g. Curve Finance v1 "
  name: String!

  " Slug of protocol, including version. e.g. curve-finance "
  slug: String!

  " Version of the subgraph schema, in SemVer format "
  schemaVersion: String!

  " Version of the subgraph implementation, in SemVer format "
  subgraphVersion: String!

  " Version of the methodology used to compute metrics "
  methodologyVersion: String!

  " The blockchain network this subgraph is indexing on "
  network: Network!

  " The type of protocol "
  type: ProtocolType!

  " Current TVL (Total Value Locked) of the entire protocol "
  totalValueLockedUSD: BigDecimal!

  " Current PCV (Protocol Controlled Value) "
  protocolControlledValueUSD: BigDecimal

  " All historical volume in USD "
  cumulativeVolumeUSD: BigDecimal!

  " Revenue claimed by suppliers (LPs) to the protocol "
  cumulativeSupplySideRevenueUSD: BigDecimal!

  " Gross revenue for the protocol "
  cumulativeProtocolSideRevenueUSD: BigDecimal!

  " All revenue generated by the protocol "
  cumulativeTotalRevenueUSD: BigDecimal!

  " Number of cumulative unique users "
  cumulativeUniqueUsers: Int!

  " Total number of pools "
  totalPoolCount: Int!

  " Daily usage metrics for this protocol "
  dailyUsageMetrics: [UsageMetricsDailySnapshot!]! @derivedFrom(field: "protocol")

  " Hourly usage metrics for this protocol "
  hourlyUsageMetrics: [UsageMetricsHourlySnapshot!]! @derivedFrom(field: "protocol")

  " Daily financial metrics for this protocol "
  financialMetrics: [FinancialsDailySnapshot!]! @derivedFrom(field: "protocol")

  " All pools that belong to this protocol "
