}

" A unique Ethereum address — used to accumulate total unique users "
type Account @entity @regularPolling {
  " Address of the account "
  id: ID!
}

" Helper entity for calculating daily/hourly active users "
type ActiveAccount @entity {
  " { daily/hourly }-{ Address of the account }-{ Days/hours since Unix epoch } "
  id: ID!
}

" Helper entity for fetching the pool address from the gauge "
type _LiquidityGauge @entity {
  " Address of the Liquidity Gauge "
  id: ID!

  " Address of the pool associated with this liquidity gauge "
  poolAddress: String!
}

" Helper entity for fetching the pool address from lpToken "
type _LpToken @entity {
  " Address of the LP Token "
  id: ID!

  " Address of the pool associated with this token "
  poolAddress: String!

  " Address of the registry associated with this token "
  registryAddress: String!
}

" Internal circular buffer used to calculate blocks per day "
type _CircularBuffer @entity {
  " 'CIRCULAR_BUFFER' "
  id: ID!

  " Array of sorted block numbers "
  blocks: [Int!]!

  " The index used with the newest block to calculate block speed "
  windowStartIndex: Int!

  " The next index to be replaced with the newest block "
  nextIndex: Int!

  " The size of the blocks array "
  bufferSize: Int!

  " The current calculated number of blocks per day "
  blocksPerDay: BigDecimal!
}
