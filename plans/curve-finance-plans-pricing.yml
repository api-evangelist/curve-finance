specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Curve Finance
providerId: curve-finance
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - DeFi
  - DEX
  - Plans
description: >-
  Curve Finance is a decentralized protocol; the public REST API at api.curve.finance is free
  and unauthenticated. There is no commercial subscription. Cost to use Curve at scale is the
  on-chain gas and protocol fee per swap (paid on-chain), not a SaaS bill.
sources:
  - https://docs.curve.finance/
  - https://github.com/curvefi/curve-api
plans:
  - id: curve-public
    name: Public REST API (Free)
    type: open
    description: Free, unauthenticated public REST API used by the Curve UI and third parties.
    entries:
      - label: Subscription
        name: public_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: No authentication
      - name: Fair-use rate limit
  - id: curve-onchain
    name: On-chain (gas + protocol fee)
    type: usage
    description: Smart-contract usage charges the user on-chain gas and Curve protocol swap fee per trade.
    entries:
      - label: Per-swap protocol fee
        name: swap_fee
        type: usage
        metric: trade
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 0.04% typical (varies by pool)
        userMultiplied: false
    elements:
      - name: Gas paid in chain native asset
      - name: Protocol fee captured by veCRV holders
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
